<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Recipe Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f5f0; color: #333; }

    header {
      background: linear-gradient(135deg, #e8572a, #f0a500);
      color: white; padding: 20px 40px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.8rem; }
    header span { font-size: 2rem; }

    nav {
      background: #fff; border-bottom: 2px solid #e8572a;
      display: flex; gap: 0; padding: 0 40px;
    }
    nav button {
      background: none; border: none; padding: 14px 24px;
      font-size: 0.95rem; cursor: pointer; color: #666;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    nav button.active, nav button:hover {
      color: #e8572a; border-bottom-color: #e8572a; font-weight: 600;
    }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    .page { display: none; }
    .page.active { display: block; }

    .card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    .card {
      background: white; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-3px); }
    .card h3 { color: #e8572a; margin-bottom: 8px; font-size: 1.1rem; }
    .card p { font-size: 0.88rem; color: #666; margin-bottom: 6px; line-height: 1.5; }
    .badge {
      display: inline-block; background: #fff3e0; color: #e8572a;
      padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; margin-bottom: 8px;
    }
    .stars { color: #f0a500; font-size: 1rem; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      padding: 7px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e8572a; color: white; }
    .btn-danger  { background: #ff5252; color: white; }
    .btn-success { background: #4caf50; color: white; }
    .btn-outline { background: white; color: #e8572a; border: 1px solid #e8572a; }

    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .section-header h2 { font-size: 1.4rem; color: #333; }

    .search-bar {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1; padding: 10px 16px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; outline: none;
    }
    .search-bar input:focus { border-color: #e8572a; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 30px;
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 20px; color: #e8572a; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.9rem; outline: none; font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: #e8572a;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #aaa;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 10px; }

    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: #333; color: white; padding: 12px 20px;
      border-radius: 10px; font-size: 0.9rem; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #4caf50; }
    .toast.error   { background: #ff5252; }

    .rating-input { display: flex; gap: 6px; }
    .rating-input button {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ddd;
      background: white; cursor: pointer; font-size: 1rem; transition: all 0.2s;
    }
    .rating-input button.selected { background: #f0a500; border-color: #f0a500; color: white; }

    .detail-section { margin-bottom: 14px; }
    .detail-section h4 { font-size: 0.85rem; color: #999; text-transform: uppercase; margin-bottom: 4px; }
    .detail-section p { font-size: 0.95rem; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <span>🍽️</span>
  <h1>Food Recipe Manager</h1>
</header>

<nav>
  <button class="active" onclick="showPage('recipes')">🍳 Resep</button>
  <button onclick="showPage('categories')">📂 Kategori</button>
</nav>

<div class="container">

  <!-- RECIPES PAGE -->
  <div id="page-recipes" class="page active">
    <div class="section-header">
      <h2>Daftar Resep</h2>
      <button class="btn btn-primary" onclick="openModal('modal-add-recipe')">+ Tambah Resep</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Cari resep..." oninput="searchRecipes()" />
    </div>
    <div class="card-grid" id="recipe-list"></div>
  </div>

  <!-- CATEGORIES PAGE -->
  <div id="page-categories" class="page">
    <div class="section-header">
      <h2>Kategori Makanan</h2>
      <button class="btn btn-primary" onclick="openModal('modal-add-category')">+ Tambah Kategori</button>
    </div>
    <div class="card-grid" id="category-list"></div>
  </div>

</div>

<!-- MODAL: Add Recipe -->
<div class="modal-overlay" id="modal-add-recipe">
  <div class="modal">
    <h2>🍳 Tambah Resep</h2>
    <div class="form-group">
      <label>Judul Resep *</label>
      <input type="text" id="r-title" placeholder="Contoh: Nasi Goreng Spesial" />
    </div>
    <div class="form-group">
      <label>Deskripsi</label>
      <input type="text" id="r-desc" placeholder="Deskripsi singkat" />
    </div>
    <div class="form-group">
      <label>Bahan-bahan *</label>
      <textarea id="r-ingredients" placeholder="Nasi, Telur, Kecap, ..."></textarea>
    </div>
    <div class="form-group">
      <label>Cara Memasak *</label>
      <textarea id="r-instructions" placeholder="1. Panaskan wajan..."></textarea>
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="r-category"></select>
    </div>
    <div class="form-group" style="display:flex;gap:12px">
      <div style="flex:1">
        <label>Waktu Masak (menit)</label>
        <input type="number" id="r-preptime" placeholder="30" min="0" />
      </div>
      <div style="flex:1">
        <label>Porsi</label>
        <input type="number" id="r-servings" placeholder="2" min="1" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-recipe')">Batal</button>
      <button class="btn btn-primary" onclick="submitRecipe()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Category -->
<div class="modal-overlay" id="modal-add-category">
  <div class="modal">
    <h2>📂 Tambah Kategori</h2>
    <div class="form-group">
      <label>Nama Kategori *</label>
      <input type="text" id="c-name" placeholder="Contoh: Makanan Berat" />
    </div>
    <div class="form-group">
      <label>Deskripsi</label>
      <input type="text" id="c-desc" placeholder="Deskripsi kategori" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-category')">Batal</button>
      <button class="btn btn-primary" onclick="submitCategory()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL: Recipe Detail -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <h2 id="detail-title"></h2>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-detail')">Tutup</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Rating -->
<div class="modal-overlay" id="modal-rating">
  <div class="modal">
    <h2>⭐ Beri Rating</h2>
    <input type="hidden" id="rating-recipe-id" />
    <div class="form-group">
      <label>Score (1–5)</label>
      <div class="rating-input" id="star-buttons"></div>
    </div>
    <div class="form-group">
      <label>Komentar</label>
      <input type="text" id="rating-comment" placeholder="Enak banget!" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-rating')">Batal</button>
      <button class="btn btn-success" onclick="submitRating()">Kirim</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let selectedStar = 0;

  // ── Nav ──────────────────────────────────────────────────────────────────
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'recipes') loadRecipes();
    if (name === 'categories') loadCategories();
  }

  // ── Modal ────────────────────────────────────────────────────────────────
  function openModal(id) {
    if (id === 'modal-add-recipe') populateCategorySelect();
    document.getElementById(id).classList.add('open');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  // ── Stars ────────────────────────────────────────────────────────────────
  function renderStars(container, score) {
    let s = '';
    for (let i = 1; i <= 5; i++) s += `<span style="color:${i<=score?'#f0a500':'#ddd'}">★</span>`;
    return s;
  }

  function buildStarButtons() {
    const wrap = document.getElementById('star-buttons');
    wrap.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.onclick = () => {
        selectedStar = i;
        wrap.querySelectorAll('button').forEach((b, idx) => {
          b.classList.toggle('selected', idx < i);
        });
      };
      wrap.appendChild(btn);
    }
    selectedStar = 0;
  }

  // ── Categories ───────────────────────────────────────────────────────────
  async function loadCategories() {
    const res = await fetch(API + '/api/categories');
    const data = await res.json();
    const list = document.getElementById('category-list');
    if (!data.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>Belum ada kategori</p></div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="card">
        <h3>${c.name}</h3>
        <p>${c.description || 'Tidak ada deskripsi'}</p>
        <div class="card-actions">
          <button class="btn btn-danger" onclick="deleteCategory(${c.id})">Hapus</button>
        </div>
      </div>`).join('');
  }

  async function populateCategorySelect() {
    const res = await fetch(API + '/api/categories');
    const data = await res.json();
    const sel = document.getElementById('r-category');
    sel.innerHTML = '<option value="">-- Pilih Kategori --</option>' +
      data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  }

  async function submitCategory() {
    const name = document.getElementById('c-name').value.trim();
    const desc = document.getElementById('c-desc').value.trim();
    if (!name) return showToast('Nama kategori wajib diisi', 'error');
    const res = await fetch(API + '/api/categories', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, description: desc })
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.errors?.join(', ') || 'Gagal', 'error');
    showToast('Kategori berhasil ditambahkan');
    closeModal('modal-add-category');
    document.getElementById('c-name').value = '';
    document.getElementById('c-desc').value = '';
    loadCategories();
  }

  async function deleteCategory(id) {
    if (!confirm('Hapus kategori ini?')) return;
    await fetch(API + '/api/categories/' + id, { method: 'DELETE' });
    showToast('Kategori dihapus');
    loadCategories();
  }

  // ── Recipes ──────────────────────────────────────────────────────────────
  async function loadRecipes(keyword = '') {
    const url = keyword ? `/api/recipes/search?q=${keyword}` : '/api/recipes';
    const res = await fetch(API + url);
    const data = await res.json();
    renderRecipes(data);
  }

  function renderRecipes(data) {
    const list = document.getElementById('recipe-list');
    if (!data.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🍳</div><p>Belum ada resep</p></div>';
      return;
    }
    list.innerHTML = data.map(r => `
      <div class="card">
        <h3>${r.title}</h3>
        ${r.description ? `<p>${r.description}</p>` : ''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
          ${r.prep_time ? `<span class="badge">⏱ ${r.prep_time} menit</span>` : ''}
          ${r.servings  ? `<span class="badge">🍽 ${r.servings} porsi</span>` : ''}
          ${r.average_rating ? `<span class="badge">⭐ ${r.average_rating}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn btn-outline" onclick="showDetail(${r.id})">Detail</button>
          <button class="btn btn-success" onclick="openRating(${r.id})">Rating</button>
          <button class="btn btn-danger" onclick="deleteRecipe(${r.id})">Hapus</button>
        </div>
      </div>`).join('');
  }

  function searchRecipes() {
    const q = document.getElementById('search-input').value.trim();
    loadRecipes(q);
  }

  async function submitRecipe() {
    const body = {
      title: document.getElementById('r-title').value.trim(),
      description: document.getElementById('r-desc').value.trim(),
      ingredients: document.getElementById('r-ingredients').value.trim(),
      instructions: document.getElementById('r-instructions').value.trim(),
      prep_time: parseInt(document.getElementById('r-preptime').value) || null,
      servings: parseInt(document.getElementById('r-servings').value) || null,
      category_id: parseInt(document.getElementById('r-category').value) || null,
    };
    const res = await fetch(API + '/api/recipes', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.errors?.join(', ') || 'Gagal', 'error');
    showToast('Resep berhasil ditambahkan! 🎉');
    closeModal('modal-add-recipe');
    ['r-title','r-desc','r-ingredients','r-instructions','r-preptime','r-servings'].forEach(id => {
      document.getElementById(id).value = '';
    });
    loadRecipes();
  }

  async function deleteRecipe(id) {
    if (!confirm('Hapus resep ini?')) return;
    await fetch(API + '/api/recipes/' + id, { method: 'DELETE' });
    showToast('Resep dihapus');
    loadRecipes();
  }

  async function showDetail(id) {
    const res = await fetch(API + '/api/recipes/' + id);
    const r = await res.json();
    const ratingRes = await fetch(API + `/api/recipes/${id}/ratings`);
    const ratings = await ratingRes.json();
    document.getElementById('detail-title').textContent = '🍳 ' + r.title;
    document.getElementById('detail-body').innerHTML = `
      ${r.description ? `<div class="detail-section"><h4>Deskripsi</h4><p>${r.description}</p></div>` : ''}
      <div class="detail-section"><h4>Bahan-bahan</h4><p>${r.ingredients}</p></div>
      <div class="detail-section"><h4>Cara Memasak</h4><p>${r.instructions}</p></div>
      <div style="display:flex;gap:12px;margin:12px 0">
        ${r.prep_time ? `<span class="badge">⏱ ${r.prep_time} menit</span>` : ''}
        ${r.servings  ? `<span class="badge">🍽 ${r.servings} porsi</span>` : ''}
        ${r.average_rating ? `<span class="badge">⭐ ${r.average_rating} / 5</span>` : ''}
      </div>
      ${ratings.length ? `<div class="detail-section"><h4>Ulasan (${ratings.length})</h4>
        ${ratings.map(rt => `<p style="margin-bottom:6px">
          <span style="color:#f0a500">${'★'.repeat(rt.score)}${'☆'.repeat(5-rt.score)}</span>
          ${rt.comment ? ' — ' + rt.comment : ''}
        </p>`).join('')}
      </div>` : ''}
    `;
    openModal('modal-detail');
  }

  // ── Rating ───────────────────────────────────────────────────────────────
  function openRating(recipeId) {
    document.getElementById('rating-recipe-id').value = recipeId;
    document.getElementById('rating-comment').value = '';
    buildStarButtons();
    openModal('modal-rating');
  }

  async function submitRating() {
    const recipeId = document.getElementById('rating-recipe-id').value;
    const comment  = document.getElementById('rating-comment').value.trim();
    if (!selectedStar) return showToast('Pilih score dulu', 'error');
    const res = await fetch(API + `/api/recipes/${recipeId}/ratings`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ score: selectedStar, comment })
    });
    const data = await res.json();
    if (!res.ok) return showToast(data.errors?.join(', ') || 'Gagal', 'error');
    showToast('Rating berhasil dikirim! ⭐');
    closeModal('modal-rating');
    loadRecipes();
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadRecipes();
</script>
</body>
</html>
